<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>✨ 2024 – Joyful Adventures ✨</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <!-- Modern Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --card-bg: rgba(30, 15, 25, 0.82);
            --card-bg-fallback: rgba(25, 10, 20, 0.88);
            --card-border: rgba(255, 255, 255, 0.22);
            --text-title: #ffc4a3;
            --text-content: #f0e6db;
            --dot-active: #ffaa70;
            --dot-inactive: rgba(255, 255, 255, 0.45);
            --progress-fill: linear-gradient(90deg, #ffaa70, #ff7799, #ffaa70);
            --shadow-card: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        body {
            min-height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            background: #1a0a12;
        }

        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -4;
            opacity: 0.7;
        }

        /* Fallback dark overlay always visible */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -3;
            pointer-events: none;
        }

        /* Aurora overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg,
                    rgba(255, 60, 140, 0.18),
                    rgba(100, 180, 255, 0.12),
                    rgba(255, 160, 80, 0.15),
                    rgba(180, 60, 200, 0.1));
            mix-blend-mode: screen;
            z-index: -2;
            pointer-events: none;
            animation: auroraShift 18s infinite alternate ease-in-out;
        }

        @keyframes auroraShift {
            0% {
                opacity: 0.6;
                filter: hue-rotate(0deg) saturate(1.2);
            }
            25% {
                opacity: 0.9;
                filter: hue-rotate(25deg) saturate(1.5);
            }
            50% {
                opacity: 0.7;
                filter: hue-rotate(-15deg) saturate(1.1);
            }
            75% {
                opacity: 0.95;
                filter: hue-rotate(10deg) saturate(1.6);
            }
            100% {
                opacity: 0.65;
                filter: hue-rotate(-5deg) saturate(1.3);
            }
        }

        .page-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 85dvh;
            animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(140px);
            background: radial-gradient(circle,
                    rgba(255, 110, 160, 0.45) 0%,
                    rgba(255, 150, 100, 0.3) 30%,
                    rgba(200, 120, 255, 0.2) 60%,
                    transparent 100%);
            animation: glowBreathe 10s infinite alternate ease-in-out,
                glowDrift 20s infinite linear;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes glowBreathe {
            0% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0.85);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.15);
            }
            100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.9);
            }
        }
        @keyframes glowDrift {
            0% {
                translate: -30px -20px;
            }
            25% {
                translate: 25px 15px;
            }
            50% {
                translate: 20px -25px;
            }
            75% {
                translate: -20px 20px;
            }
            100% {
                translate: -30px -20px;
            }
        }

        .top-badge {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: #ffefcf;
            font-weight: 500;
            letter-spacing: 1.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        .cursor {
            display: inline-block;
            margin-left: 2px;
            color: #fff;
            font-weight: 400;
            animation: blink 1s step-end infinite;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .cursor.visible {
            opacity: 1;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ── BLURRED BACKDROP PANEL (2021-style fallback) ── */
        .card-backdrop {
            position: absolute;
            inset: -10px;
            border-radius: 32px;
            background: rgba(20, 8, 15, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
        }

        .parallax-wrapper {
            perspective: 1200px;
            width: 100%;
            z-index: 3;
            position: relative;
            transition: transform 0.15s ease-out;
            will-change: transform;
        }

        .book-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--card-border);
            padding: 1.6rem 1.8rem 1.8rem;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
            transform-style: preserve-3d;
            position: relative;
            z-index: 4;
            overflow: visible;
            will-change: transform;
        }

        /* Fallback when backdrop-filter not supported */
        @supports not (backdrop-filter: blur(1px)) {
            .book-card {
                background: var(--card-bg-fallback);
            }
        }

        .book-card.enter {
            animation: cardEntrance 0.7s ease-out both;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .book-card:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 0 80px rgba(255, 120, 160, 0.2);
        }

        .book-card.flip {
            animation: pageTurn 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes pageTurn {
            0% {
                transform: perspective(1000px) rotateY(0deg) scale(1);
            }
            40% {
                transform: perspective(1000px) rotateY(22deg) scale(0.94);
            }
            100% {
                transform: perspective(1000px) rotateY(0deg) scale(1);
            }
        }

        .progress-wrapper {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            margin-bottom: 1.2rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--progress-fill);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(255, 150, 100, 0.6);
            position: relative;
        }
        .progress-bar::after {
            content: "";
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .title-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.4rem;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.18);
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .year-title {
            font-size: 2.2rem;
            color: var(--text-title);
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .page-count {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .page-content {
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: justify;
            color: var(--text-content);
            min-height: 200px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', serif;
            font-weight: 400;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .timeline-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 1.2rem 0 0.8rem;
            flex-wrap: wrap;
        }
        .timeline-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--dot-inactive);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            outline: none;
        }
        .timeline-dot:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.3);
            box-shadow: 0 0 14px rgba(255, 180, 140, 0.6);
        }
        .timeline-dot.active {
            background: var(--dot-active);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 18px rgba(255, 150, 100, 0.8), 0 0 6px rgba(255, 200, 150, 0.5);
            width: 13px;
            height: 13px;
            transform: scale(1.25);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 0.6rem;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.55rem 1.3rem;
            border-radius: 40px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            flex: 1;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.25s ease;
            border-radius: 40px;
        }
        .nav-btn:hover::before {
            opacity: 1;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            filter: grayscale(30%);
        }
        .nav-icon {
            width: 16px;
            height: 16px;
            stroke-width: 2.4;
            vertical-align: -3px;
            transition: transform 0.25s ease;
        }
        #prevBtn:not(:disabled):hover .nav-icon {
            transform: translateX(-3px);
        }
        #nextBtn:not(:disabled):hover .nav-icon {
            transform: translateX(3px);
        }

        /* Balloons */
        .balloons-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .balloon {
            position: absolute;
            bottom: -80px;
            font-size: 2.2rem;
            animation: floatUp 6s linear infinite;
            opacity: 0.65;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }
        @keyframes floatUp {
            0% {
                bottom: -80px;
                opacity: 0.75;
                transform: rotate(0deg) translateX(0px);
            }
            100% {
                bottom: 110%;
                opacity: 0;
                transform: rotate(12deg) translateX(20px);
            }
        }

        #confettiContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .confetti-particle {
            position: absolute;
            animation: confettiFly var(--dur) ease-out forwards;
        }
        @keyframes confettiFly {
            0% {
                transform: translate(0, 0) rotate(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.1);
                opacity: 0;
            }
        }

        /* Premium Music & Menu Buttons */
        .music-top,
        .menu-bottom {
            position: fixed;
            z-index: 200;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #fff5ee;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.6px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg,
                    rgba(255, 90, 130, 0.18),
                    rgba(255, 150, 80, 0.12) 50%,
                    rgba(255, 200, 160, 0.08));
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            line-height: 1;
        }
        .music-top {
            top: 15px;
            right: 15px;
        }
        .menu-bottom {
            bottom: 15px;
            right: 15px;
        }

        .music-top:hover,
        .menu-bottom:hover {
            background: linear-gradient(135deg,
                    rgba(255, 100, 140, 0.4),
                    rgba(255, 160, 110, 0.3) 50%,
                    rgba(255, 200, 150, 0.2));
            border-color: rgba(255, 210, 180, 0.7);
            box-shadow: 0 0 28px rgba(255, 130, 130, 0.5), 0 8px 20px rgba(0, 0, 0, 0.3);
            transform: translateY(-3px) scale(1.03);
            color: #fff;
        }
        .music-top i,
        .menu-bottom i {
            width: 16px;
            height: 16px;
            stroke-width: 2;
        }

        @media (max-width: 768px) {
            .book-card {
                padding: 1.3rem 1.2rem 1.4rem;
                border-radius: 22px;
            }
            .card-backdrop {
                border-radius: 26px;
                inset: -8px;
            }
            .year-title {
                font-size: 1.7rem;
            }
            .page-content {
                font-size: 0.95rem;
                min-height: 180px;
            }
            .nav-btn {
                font-size: 0.8rem;
                padding: 0.45rem 0.9rem;
            }
            .ambient-glow {
                width: 320px;
                height: 320px;
            }
            .music-top,
            .menu-bottom {
                padding: 0.4rem 1rem;
                font-size: 0.7rem;
            }
            .top-badge {
                font-size: 0.8rem;
                padding: 0.4rem 1.2rem;
            }
        }
        @media (max-width: 450px) {
            .book-card {
                padding: 1rem 0.9rem 1.1rem;
                border-radius: 18px;
            }
            .card-backdrop {
                border-radius: 22px;
                inset: -6px;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
            }
            .page-content {
                font-size: 0.85rem;
                min-height: 160px;
            }
            .year-title {
                font-size: 1.4rem;
            }
            .timeline-dots {
                gap: 7px;
            }
            .top-badge {
                font-size: 0.7rem;
                padding: 0.35rem 1rem;
            }
        }
    </style>
</head>
<body>
    <video id="bgVideo" autoplay loop muted playsinline>
        <source src="videos/2022-bg.mp4" type="video/mp4">
    </video>

    <div class="balloons-area" id="balloonArea"></div>
    <div id="confettiContainer"></div>

    <div class="page-container">
        <div class="ambient-glow"></div>
        <div class="top-badge" id="topBadge">
            <span id="badgeText"></span><span class="cursor" id="badgeCursor">|</span>
        </div>
        <div class="parallax-wrapper" id="parallaxWrapper">
            <!-- Blurred Backdrop Panel (2021-style fallback) -->
            <div class="card-backdrop"></div>
            <div class="book-card enter" id="bookCard">
                <div class="progress-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="title-row">
                    <span class="year-title">✨ 2024 ✨</span>
                    <span class="page-count" id="pageCount">Page 1 of 3</span>
                </div>
                <div class="page-content" id="pageText"></div>
                <div class="timeline-dots" id="timelineDots"></div>
                <div class="nav-buttons">
                    <button id="prevBtn" class="nav-btn"><i data-lucide="chevron-left" class="nav-icon"></i> Previous
                    Page</button>
                    <button id="nextBtn" class="nav-btn">Next Page <i data-lucide="chevron-right"
                            class="nav-icon"></i></button>
                </div>
            </div>
        </div>
    </div>

    <button id="musicToggleBtn" class="music-top">
        <i data-lucide="volume-x" id="musicIcon"></i>
        <span id="musicLabel">Music Off</span>
    </button>

    <a href="index.html" class="menu-bottom">
        <i data-lucide="home"></i>
        <span>Main Menu</span>
    </a>

    <audio id="bgAudio" loop preload="auto">
        <source src="audio/soulprodmusic-happy-birthday-220024.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ═══ DISABLE RIGHT-CLICK & DEVTOOLS KEYS ═══
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };

        // Initialize Lucide icons (with retry if CDN delays)
        function initLucide(retries = 3) {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            } else if (retries > 0) {
                setTimeout(() => initLucide(retries - 1), 300);
            }
        }
        initLucide();

        const storyPages = [
            "2024 exploded with colour and confetti. You said yes to adventures, danced in the rain, and collected smiles like souvenirs. Every day felt like a celebration. Spring brought road trips with no destination. You sang out loud, made new friends, and discovered hidden cafes. Your heart became a compass for joy.",
            "Summer was a festival of freedom. You swam in moonlit lakes, built sandcastles that crumbled beautifully, and learned that happiness is a choice you make. Autumn arrived with golden leaves and cosy blankets. You wrote letters to your future self, forgiving the past and embracing the now.",
            "Winter taught you that warmth comes from within. You gave generously, loved deeply, and laughed until your stomach hurt. 2024 was a masterpiece of joyful chaos. May you carry this joy into every tomorrow. 🎉🌈 The world needs your light. Shine on!"
        ];

        let currentPage = 0;
        const textDiv = document.getElementById('pageText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const bookCard = document.getElementById('bookCard');
        const parallaxWrapper = document.getElementById('parallaxWrapper');
        const progressBar = document.getElementById('progressBar');
        const pageCountEl = document.getElementById('pageCount');
        const timelineDotsContainer = document.getElementById('timelineDots');
        const confettiContainer = document.getElementById('confettiContainer');
        let typeInterval = null,
            isTyping = false;
        const totalPages = storyPages.length;

        // Typewriter Birthday Badge
        const badgeTextEl = document.getElementById('badgeText');
        const badgeCursor = document.getElementById('badgeCursor');
        const birthdayMsg = '🎂 Happy Birthday! 🎉';

        function typeBadge() {
            let i = 0;
            badgeTextEl.textContent = '';
            badgeCursor.classList.remove('visible');
            const timer = setInterval(() => {
                if (i < birthdayMsg.length) {
                    badgeTextEl.textContent += birthdayMsg.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    badgeCursor.classList.add('visible');
                }
            }, 90);
        }

        // Timeline Dots
        function buildTimelineDots() {
            timelineDotsContainer.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('span');
                dot.className = 'timeline-dot';
                dot.setAttribute('aria-label', 'Page ' + (i + 1));
                dot.addEventListener('click', () => {
                    if (i !== currentPage) {
                        currentPage = i;
                        updatePage(true);
                    }
                });
                timelineDotsContainer.appendChild(dot);
            }
        }

        function updateTimelineDots() {
            const dots = timelineDotsContainer.querySelectorAll('.timeline-dot');
            dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentPage));
        }

        function updateProgressBar() {
            progressBar.style.width = ((currentPage + 1) / totalPages * 100) + '%';
        }

        function updatePageCount() {
            pageCountEl.textContent = `Page ${currentPage + 1} of ${totalPages}`;
        }

        // Typing effect for page text
        function typeText(element, text) {
            if (typeInterval) clearInterval(typeInterval);
            element.innerHTML = '';
            let idx = 0;
            isTyping = true;
            typeInterval = setInterval(() => {
                if (idx < text.length) {
                    element.innerHTML += text.charAt(idx);
                    idx++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                }
            }, 28);
        }

        // Confetti burst
        function createConfettiExplosion() {
            const cardRect = bookCard.getBoundingClientRect();
            const cx = cardRect.left + cardRect.width / 2;
            const cy = cardRect.top + cardRect.height / 2;
            const colors = ['#ff6b9d', '#ffaa5c', '#ffd166', '#06d6a0', '#118ab2', '#ef476f', '#ffc43d', '#a29bfe'];
            const frag = document.createDocumentFragment();
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-particle';
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * 200;
                p.style.cssText = `
                    left:${cx}px; top:${cy}px;
                    width:${4 + Math.random() * 10}px; height:${(4 + Math.random() * 8)}px;
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    --tx:${Math.cos(angle) * dist}px; --ty:${Math.sin(angle) * dist - 40}px;
                    --rot:${(Math.random() - 0.5) * 720}deg;
                    --dur:${500 + Math.random() * 500}ms;
                `;
                frag.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
            confettiContainer.appendChild(frag);
        }

        function updatePage(animate = true) {
            if (isTyping) clearInterval(typeInterval);
            typeText(textDiv, storyPages[currentPage]);
            if (animate) {
                bookCard.classList.add('flip');
                setTimeout(() => bookCard.classList.remove('flip'), 550);
                setTimeout(createConfettiExplosion, 150);
            }
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            updateProgressBar();
            updatePageCount();
            updateTimelineDots();
        }

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentPage > 0) { currentPage--;
                updatePage(true); }
        });
        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages - 1) { currentPage++;
                updatePage(true); }
        });

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.isContentEditable) return;
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (currentPage < totalPages - 1) { currentPage++;
                    updatePage(true); }
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (currentPage > 0) { currentPage--;
                    updatePage(true); }
            }
        });

        // Swipe
        let touchStartX = 0,
            touchStartY = 0;
        bookCard.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });
        bookCard.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                if (dx < 0 && currentPage < totalPages - 1) { currentPage++;
                    updatePage(true); } else if (dx > 0 && currentPage > 0) { currentPage--;
                    updatePage(true); }
            }
        }, { passive: true });

        // Parallax (with cleanup)
        let isDesktop = window.matchMedia('(min-width: 769px)').matches;
        let mouseX = window.innerWidth / 2,
            mouseY = window.innerHeight / 2;
        let currentRotY = 0,
            currentRotX = 0;
        let parallaxRunning = false;
        let rafId = null;

        window.addEventListener('mousemove', e => {
            if (!isDesktop) return;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.matchMedia('(min-width: 769px)').addEventListener('change', e => {
            isDesktop = e.matches;
            if (!isDesktop) {
                parallaxWrapper.style.transform = 'none';
                currentRotY = 0;
                currentRotX = 0;
                parallaxRunning = false;
                if (rafId) cancelAnimationFrame(rafId);
            } else if (!parallaxRunning) {
                parallaxRunning = true;
                updateParallax();
            }
        });

        function updateParallax() {
            if (!isDesktop || !parallaxRunning) return;
            const targetRotY = ((mouseX - window.innerWidth / 2) / (window.innerWidth / 2)) * 6;
            const targetRotX = -((mouseY - window.innerHeight / 2) / (window.innerHeight / 2)) * 4;
            currentRotY += (targetRotY - currentRotY) * 0.08;
            currentRotX += (targetRotX - currentRotX) * 0.08;
            parallaxWrapper.style.transform =
                `perspective(1200px) rotateY(${currentRotY}deg) rotateX(${currentRotX}deg)`;
            rafId = requestAnimationFrame(updateParallax);
        }

        if (isDesktop) {
            parallaxRunning = true;
            updateParallax();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            parallaxRunning = false;
            if (rafId) cancelAnimationFrame(rafId);
            if (typeInterval) clearInterval(typeInterval);
        });

        // Balloons
        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.innerHTML = ['🎈', '🎀', '🎉', '💖', '🎂', '🎁'][Math.floor(Math.random() * 6)];
            b.style.left = Math.random() * 100 + '%';
            b.style.fontSize = (25 + Math.random() * 40) + 'px';
            b.style.animationDuration = (5 + Math.random() * 6) + 's';
            document.getElementById('balloonArea').appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        const balloonInterval = setInterval(createBalloon, 1000);
        for (let i = 0; i < 12; i++) setTimeout(createBalloon, i * 400);

        // Cleanup balloon interval
        window.addEventListener('beforeunload', () => clearInterval(balloonInterval));

        // Music Control
        const audio = document.getElementById('bgAudio');
        const musicBtn = document.getElementById('musicToggleBtn');
        const musicIcon = document.getElementById('musicIcon');
        const musicLabel = document.getElementById('musicLabel');
        let isMusicPlaying = false;
        audio.volume = 0.2;
        audio.loop = true;

        function updateMusicUI() {
            if (isMusicPlaying) {
                musicIcon.setAttribute('data-lucide', 'volume-2');
                musicLabel.textContent = 'Music On';
            } else {
                musicIcon.setAttribute('data-lucide', 'volume-x');
                musicLabel.textContent = 'Music Off';
            }
            // Refresh Lucide icons
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }

        musicBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                audio.pause();
                isMusicPlaying = false;
            } else {
                audio.play().catch(e => console.log('Audio error:', e));
                isMusicPlaying = true;
            }
            updateMusicUI();
        });

        // Initialize
        buildTimelineDots();
        updatePage(false);
        setTimeout(typeBadge, 400);
    </script>
</body>
</html>
