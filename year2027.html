<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Slideshow · Video End</title>
  <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
  <style>
    /* ── reset & base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --app-height: 100vh; /* set precisely by JS, handles mobile browser chrome */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      width: 100%;
      height: var(--app-height);
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
      font-family: 'Playfair Display', Georgia, serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .scene {
      width: 100vw;
      height: var(--app-height);
      position: relative;
      background: #000;
      overflow: hidden;
    }

    /* ── slides wrapper (vertical) ── */
    .slides-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
    }

    /* ── each slide ── */
    .slide {
      flex: none;
      width: 100vw;
      height: var(--app-height);
      position: relative;
      overflow: hidden;
    }

    .slide .img-wrap {
      width: 100%; height: 100%;
      overflow: hidden;
      position: relative;
      background: #0a0a0a;
    }

    .slide .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      will-change: transform;
      animation: kenBurns 20s ease-in-out infinite alternate;
      transform-origin: center center;
    }

    @keyframes kenBurns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.12) translate(-2%, -3%); }
    }

    /* dark overlay for text */
    .slide .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 4, 18, 0.25) 0%, rgba(8, 4, 18, 0.55) 100%);
      display: flex;
      flex-direction: column;
      padding: clamp(1.25rem, 5vw, 3.5rem);
      padding-top: calc(clamp(1.25rem, 5vw, 3.5rem) + var(--safe-top));
      padding-bottom: calc(clamp(1.25rem, 5vw, 3.5rem) + var(--safe-bottom));
      padding-left: calc(clamp(1.25rem, 5vw, 3.5rem) + var(--safe-left));
      padding-right: calc(clamp(1.25rem, 5vw, 3.5rem) + var(--safe-right));
      pointer-events: none;
    }

    .slide .overlay.align-center {
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .slide .overlay.align-top-left {
      align-items: flex-start;
      justify-content: flex-start;
      text-align: left;
    }
    .slide .overlay.align-top-right {
      align-items: flex-end;
      justify-content: flex-start;
      text-align: right;
    }
    .slide .overlay.align-bottom-left {
      align-items: flex-start;
      justify-content: flex-end;
      text-align: left;
    }
    .slide .overlay.align-bottom-right {
      align-items: flex-end;
      justify-content: flex-end;
      text-align: right;
    }

    .slide .line {
      font-size: clamp(1.05rem, 4.2vw, 2.6rem);
      font-weight: 400;
      letter-spacing: 0.03em;
      color: #f0e8f0;
      text-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 2px 12px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      transition: opacity 0.8s ease 0.2s, transform 0.8s cubic-bezier(0.23,1,0.32,1) 0.2s;
      will-change: transform, opacity;
      line-height: 1.4;
      margin: 0.15rem 0;
      max-width: min(85%, 780px);
    }

    .slide.active .line {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .slide .line:nth-child(1) { transition-delay: 0.1s; }
    .slide .line:nth-child(2) { transition-delay: 0.25s; }
    .slide .line:nth-child(3) { transition-delay: 0.4s; }
    .slide .line:nth-child(4) { transition-delay: 0.55s; }
    .slide .line:nth-child(5) { transition-delay: 0.7s; }

    /* ── hold indicator ── */
    .hold-indicator {
      position: fixed;
      bottom: calc(40px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255,215,255,0.25);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .hold-indicator.visible { opacity: 1; }

    /* ── video overlay (end screen) ── */
    .video-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: var(--app-height);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    .video-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .video-overlay video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.07;
      transition: opacity 2s ease;
    }
    .video-overlay.show video {
      opacity: 0.07;
    }

    /* ── audio controls hidden ── */
    .audio-controls { display: none !important; }

    /* ═══ RESPONSIVE BREAKPOINTS ═══ */

    /* small phones */
    @media (max-width: 380px) {
      .slide .line { font-size: clamp(0.85rem, 3.6vw, 1.4rem); line-height: 1.35; }
      .hold-indicator { font-size: 9.5px; bottom: calc(24px + var(--safe-bottom)); }
    }

    /* phones */
    @media (min-width: 381px) and (max-width: 640px) {
      .slide .line { max-width: 92%; }
    }

    /* tablets (portrait & landscape) */
    @media (min-width: 641px) and (max-width: 1024px) {
      .slide .line { font-size: clamp(1.4rem, 3.6vw, 2.4rem); max-width: 75%; }
    }

    /* laptops & desktops */
    @media (min-width: 1025px) {
      .slide .line { font-size: clamp(1.6rem, 2.6vw, 3rem); max-width: 60%; }
      .hold-indicator { font-size: 12px; }
    }

    /* large desktop / 4K */
    @media (min-width: 1600px) {
      .slide .line { font-size: clamp(2rem, 2.2vw, 3.6rem); max-width: 55%; }
    }

    /* short viewports (landscape phones, split-screen) */
    @media (max-height: 480px) {
      .slide .overlay { padding-top: calc(0.75rem + var(--safe-top)); padding-bottom: calc(0.75rem + var(--safe-bottom)); }
      .slide .line { font-size: clamp(0.8rem, 3.4vh, 1.6rem); margin: 0.08rem 0; line-height: 1.25; }
      .hold-indicator { bottom: calc(14px + var(--safe-bottom)); font-size: 9px; }
    }

    /* landscape phones specifically */
    @media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
      .slide .line { max-width: 70%; }
    }

    /* foldables / very wide narrow screens */
    @media (min-aspect-ratio: 21/9) {
      .slide .line { max-width: 50%; }
    }

    /* reduced motion accessibility */
    @media (prefers-reduced-motion: reduce) {
      .slide .img-wrap img { animation: none; }
      .slides-wrapper { transition: none !important; }
      .slide .line { transition-duration: 0.3s !important; }
    }

    /* high-density screens: crisper text shadow */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .slide .line { text-shadow: 0 3px 24px rgba(0,0,0,0.85), 0 1px 8px rgba(0,0,0,0.6); }
    }

    .scene { opacity: 0; animation: fadeIn 1.2s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="slides-wrapper" id="slidesWrapper"></div>

    <div class="hold-indicator" id="holdIndicator">
      <span class="pause-icon">⏸</span> paused
    </div>

    <div class="video-overlay" id="videoOverlay">
      <video id="endVideo" muted playsinline webkit-playsinline>
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="audio-controls"></div>
  </div>

  <script>
    (function() {
      'use strict';

      // ═══════════════════════════════════════════════════
      //  ★  USER CONFIGURATION  ★
      // ═══════════════════════════════════════════════════

      const IMAGES = [
        'https://picsum.photos/seed/poem1/1920/1080',
        'https://picsum.photos/seed/poem2/1920/1080',
        'https://picsum.photos/seed/poem3/1920/1080',
        'https://picsum.photos/seed/poem4/1920/1080',
        'https://picsum.photos/seed/poem5/1920/1080',
        'https://picsum.photos/seed/poem6/1920/1080',
        'https://picsum.photos/seed/poem7/1920/1080',
        'https://picsum.photos/seed/poem8/1920/1080',
        'https://picsum.photos/seed/poem9/1920/1080',
        'https://picsum.photos/seed/poem10/1920/1080'
      ];

      const VIDEO_URL = 'Videos/us.mp4';

      const AUDIO_CONFIG = {
        type: 'file',
        presetName: null,
        fileUrl: 'audio/ed-sheeran-photograph.mp3',
        volume: 0.30
      };

      const SCROLL_INTERVAL = 5000;

      const SLIDES = [
        { lines: ['✨ 2027 hasn’t arrived yet…','but whenever you open this,','know that someone out there','is already planning something','more beautiful for you. 💖'], align: 'center' },
        { lines: ['This space is reserved','for your wish —','a dream, a hope,','a promise.'], align: 'top-left' },
        { lines: ['You deserve every bit','of magic this world','has to offer.'], align: 'top-right' },
        { lines: ['Keep smiling,','keep believing,','Bipasha. 🌸'], align: 'bottom-left' },
        { lines: ['Take care of yourself.','Always. 🤍'], align: 'bottom-right' },
        { lines: ['✨ 2027 hasn’t arrived yet…','but whenever you open this,','know that someone out there','is already planning something','more beautiful for you. 💖'], align: 'center' },
        { lines: ['This space is reserved','for your wish —','a dream, a hope,','a promise.'], align: 'top-left' },
        { lines: ['You deserve every bit','of magic this world','has to offer.'], align: 'top-right' },
        { lines: ['Keep smiling,','keep believing,','Bipasha. 🌸'], align: 'bottom-left' },
        { lines: ['Take care of yourself.','Always. 🤍'], align: 'bottom-right' }
      ];

      // ═══════════════════════════════════════════════════
      //  END OF CONFIG
      // ═══════════════════════════════════════════════════

      const totalSlides = SLIDES.length;
      let currentIndex = 0;
      let autoScrollInterval = null;
      let isHeld = false;
      let isTransitioning = false;
      let hasEnded = false;
      let appHeight = window.innerHeight;

      const wrapper = document.getElementById('slidesWrapper');
      const holdIndicator = document.getElementById('holdIndicator');
      const videoOverlay = document.getElementById('videoOverlay');
      const endVideo = document.getElementById('endVideo');

      // ── true viewport height fix (mobile browser chrome, notches, keyboard) ──
      function setAppHeight() {
        appHeight = window.innerHeight;
        document.documentElement.style.setProperty('--app-height', appHeight + 'px');
        // reposition instantly without animating on resize
        if (wrapper) {
          const prevTransition = wrapper.style.transition;
          wrapper.style.transition = 'none';
          wrapper.style.transform = `translateY(-${currentIndex * appHeight}px)`;
          void wrapper.offsetHeight; // force reflow
          wrapper.style.transition = prevTransition;
        }
      }

      let resizeTimer = null;
      function debouncedResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(setAppHeight, 120);
      }
      window.addEventListener('resize', debouncedResize, { passive: true });
      window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 200), { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', debouncedResize, { passive: true });
      }

      // ── render slides ──
      function renderSlides() {
        wrapper.innerHTML = '';
        for (let i = 0; i < totalSlides; i++) {
          const slide = document.createElement('div');
          slide.className = 'slide';
          slide.dataset.index = i;

          const imgWrap = document.createElement('div');
          imgWrap.className = 'img-wrap';
          const img = document.createElement('img');
          const imgUrl = IMAGES[i % IMAGES.length] || 'https://picsum.photos/seed/default/1920/1080';
          img.src = imgUrl;
          img.alt = 'poetry background';
          img.loading = i === 0 ? 'eager' : 'lazy';
          img.decoding = 'async';
          imgWrap.appendChild(img);
          slide.appendChild(imgWrap);

          const overlay = document.createElement('div');
          overlay.className = 'overlay';
          overlay.classList.add('align-' + SLIDES[i].align);

          SLIDES[i].lines.forEach((text) => {
            const line = document.createElement('div');
            line.className = 'line';
            line.textContent = text;
            overlay.appendChild(line);
          });

          slide.appendChild(overlay);
          wrapper.appendChild(slide);
        }
      }

      // ── update slide position (uses measured px height, not vh) ──
      function goTo(index, immediate) {
        if (isTransitioning || hasEnded) return;
        if (index >= totalSlides) {
          showEndScreen();
          return;
        }
        if (index < 0) index = 0;

        isTransitioning = true;
        const duration = immediate ? '0s' : '1.2s';
        wrapper.style.transition = `transform ${duration} cubic-bezier(0.23, 1, 0.32, 1)`;
        wrapper.style.transform = `translateY(-${index * appHeight}px)`;

        document.querySelectorAll('.slide').forEach((el, i) => {
          el.classList.toggle('active', i === index);
        });

        currentIndex = index;

        setTimeout(() => {
          isTransitioning = false;
        }, immediate ? 50 : 1300);
      }

      function next() {
        if (hasEnded) return;
        goTo(currentIndex + 1);
      }

      function showEndScreen() {
        if (hasEnded) return;
        hasEnded = true;
        stopAutoScroll();
        fadeOutAudio();

        wrapper.style.transition = 'opacity 1.5s ease';
        wrapper.style.opacity = '0';

        setTimeout(() => {
          videoOverlay.classList.add('show');
          if (endVideo.src) {
            endVideo.play().catch(() => {});
          }
        }, 1600);
      }

      function startAutoScroll() {
        stopAutoScroll();
        if (hasEnded) return;
        autoScrollInterval = setInterval(() => {
          if (!isHeld && !isTransitioning && !hasEnded) {
            next();
          }
        }, SCROLL_INTERVAL);
      }

      function stopAutoScroll() {
        if (autoScrollInterval) {
          clearInterval(autoScrollInterval);
          autoScrollInterval = null;
        }
      }

      function restartAutoScroll() {
        if (!isHeld && !hasEnded) startAutoScroll();
      }

      function setHold(hold) {
        isHeld = hold;
        if (hold) {
          stopAutoScroll();
          holdIndicator.classList.add('visible');
        } else {
          holdIndicator.classList.remove('visible');
          restartAutoScroll();
        }
      }

      // ── pointer events (unifies mouse + touch, more reliable across devices) ──
      const sceneEl = document.getElementById('scene');
      let pointerActive = false;

      sceneEl.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.video-overlay')) return;
        pointerActive = true;
        setHold(true);
      });
      const releasePointer = (e) => {
        if (!pointerActive) return;
        pointerActive = false;
        setHold(false);
      };
      sceneEl.addEventListener('pointerup', releasePointer);
      sceneEl.addEventListener('pointercancel', releasePointer);
      sceneEl.addEventListener('pointerleave', releasePointer);

      // ── keyboard (laptop/desktop) ──
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (!hasEnded) { next(); stopAutoScroll(); restartAutoScroll(); }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (!hasEnded && currentIndex > 0) {
            goTo(currentIndex - 1);
            stopAutoScroll();
            restartAutoScroll();
          }
        } else if (e.key === ' ') {
          e.preventDefault();
          setHold(!isHeld);
        }
      });

      // ─── AUDIO ENGINE ───
      let audioContext = null;
      let audioNodes = [];
      let audioElement = null;
      let masterGain = null;
      let isAudioInitialized = false;

      function createReverb(ctx) {
        const convolver = ctx.createConvolver();
        const len = ctx.sampleRate * 1.2;
        const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < len; i++) {
          const n = Math.random() * 2 - 1;
          const decay = Math.exp(-i / (ctx.sampleRate * 0.6));
          left[i] = n * decay * 0.6;
          right[i] = n * decay * 0.6;
        }
        convolver.buffer = impulse;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        convolver.connect(gain);
        return gain;
      }

      const trackPresets = {
        ambient: {
          generate: (ctx) => {
            const nodes = [];
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(110, ctx.currentTime);
            osc1.detune.setValueAtTime(-12, ctx.currentTime);
            gain1.gain.setValueAtTime(0.06, ctx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.04, ctx.currentTime + 2);
            const reverb1 = createReverb(ctx);
            osc1.connect(gain1); gain1.connect(reverb1); reverb1.connect(masterGain);
            osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + 60);
            nodes.push(osc1, gain1, reverb1);

            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(164.8, ctx.currentTime);
            gain2.gain.setValueAtTime(0.05, ctx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.025, ctx.currentTime + 3);
            const reverb2 = createReverb(ctx);
            osc2.connect(gain2); gain2.connect(reverb2); reverb2.connect(masterGain);
            osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 60);
            nodes.push(osc2, gain2, reverb2);

            const bufferSize = ctx.sampleRate * 0.5;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.02;
            const noise = ctx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const gainN = ctx.createGain();
            gainN.gain.setValueAtTime(0.03, ctx.currentTime);
            gainN.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 4);
            const reverbN = createReverb(ctx);
            noise.connect(gainN); gainN.connect(reverbN); reverbN.connect(masterGain);
            noise.start(ctx.currentTime);
            nodes.push(noise, gainN, reverbN);
            return nodes;
          }
        },
        piano: {
          generate: (ctx) => {
            const nodes = [];
            const notes = [261.6, 329.6, 392.0, 523.3, 659.3, 783.9, 1046.5];
            const pattern = [0, 2, 4, 3, 1, 3, 5, 4, 2, 0];
            let time = ctx.currentTime + 0.2;
            pattern.forEach((idx, i) => {
              const freq = notes[idx % notes.length] * (0.98 + Math.random() * 0.04);
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(freq, time);
              gain.gain.setValueAtTime(0, time);
              gain.gain.linearRampToValueAtTime(0.06, time + 0.04);
              gain.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
              const reverb = createReverb(ctx);
              osc.connect(gain); gain.connect(reverb); reverb.connect(masterGain);
              osc.start(time); osc.stop(time + 0.7);
              nodes.push(osc, gain, reverb);
              time += 0.5 + Math.random() * 0.3;
              if (i % 3 === 0) time += 0.2;
            });
            return nodes;
          }
        },
        bells: {
          generate: (ctx) => {
            const nodes = [];
            const freqs = [440, 550, 660, 880, 1100, 1320, 1760];
            let time = ctx.currentTime + 0.1;
            for (let i = 0; i < 12; i++) {
              const f = freqs[i % freqs.length] * (1 + (Math.random() - 0.5) * 0.06);
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(f, time);
              const g = 0.035 + Math.random() * 0.03;
              gain.gain.setValueAtTime(0, time);
              gain.gain.linearRampToValueAtTime(g, time + 0.02);
              gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2 + Math.random() * 0.8);
              const reverb = createReverb(ctx);
              osc.connect(gain); gain.connect(reverb); reverb.connect(masterGain);
              osc.start(time); osc.stop(time + 1.8);
              nodes.push(osc, gain, reverb);
              time += 0.35 + Math.random() * 0.25;
            }
            return nodes;
          }
        },
        drone: {
          generate: (ctx) => {
            const nodes = [];
            const baseFreqs = [55, 72, 88, 110, 132];
            baseFreqs.forEach((f, idx) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = idx % 2 === 0 ? 'sawtooth' : 'square';
              osc.frequency.setValueAtTime(f * (1 + (idx - 2) * 0.02), ctx.currentTime);
              const g = 0.025 + idx * 0.005;
              gain.gain.setValueAtTime(g * 0.5, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(g, ctx.currentTime + 4);
              const reverb = createReverb(ctx);
              osc.connect(gain); gain.connect(reverb); reverb.connect(masterGain);
              osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 60);
              nodes.push(osc, gain, reverb);
            });
            const oscL = ctx.createOscillator();
            const gainL = ctx.createGain();
            oscL.type = 'sine';
            oscL.frequency.setValueAtTime(36, ctx.currentTime);
            gainL.gain.setValueAtTime(0.04, ctx.currentTime);
            gainL.gain.exponentialRampToValueAtTime(0.02, ctx.currentTime + 5);
            const reverbL = createReverb(ctx);
            oscL.connect(gainL); gainL.connect(reverbL); reverbL.connect(masterGain);
            oscL.start(ctx.currentTime); oscL.stop(ctx.currentTime + 60);
            nodes.push(oscL, gainL, reverbL);
            return nodes;
          }
        }
      };

      function initAudio() {
        if (isAudioInitialized) return;
        try {
          audioContext = new(window.AudioContext || window.webkitAudioContext)();
          masterGain = audioContext.createGain();
          masterGain.gain.setValueAtTime(AUDIO_CONFIG.volume, audioContext.currentTime);
          masterGain.connect(audioContext.destination);
          isAudioInitialized = true;
          if (audioContext.state === 'suspended') {
            audioContext.resume();
          }
          playTrack();
        } catch (e) {
          console.warn('Audio init failed:', e);
        }
      }

      function playTrack() {
        if (!audioContext || !masterGain) return;
        stopAudio();

        if (AUDIO_CONFIG.type === 'file' && AUDIO_CONFIG.fileUrl) {
          if (!audioElement) {
            audioElement = new Audio();
            audioElement.loop = true;
            audioElement.preload = 'auto';
          }
          audioElement.src = AUDIO_CONFIG.fileUrl;
          audioElement.volume = AUDIO_CONFIG.volume;
          audioElement.play().catch(() => {});
          return;
        }

        const preset = trackPresets[AUDIO_CONFIG.presetName] || trackPresets.ambient;
        try {
          const nodes = preset.generate(audioContext);
          audioNodes = nodes;
          if (audioContext.state === 'suspended') {
            audioContext.resume();
          }
        } catch (e) {
          console.warn('Track generation failed:', e);
        }
      }

      function stopAudio() {
        audioNodes.forEach((node) => {
          try { if (node.stop) node.stop(); if (node.disconnect) node.disconnect(); } catch (_) {}
        });
        audioNodes = [];
        if (audioElement) {
          try { audioElement.pause(); audioElement.src = ''; } catch (_) {}
        }
      }

      function fadeOutAudio() {
        if (masterGain) {
          try {
            const currentTime = audioContext.currentTime;
            masterGain.gain.setValueAtTime(masterGain.gain.value, currentTime);
            masterGain.gain.exponentialRampToValueAtTime(0.001, currentTime + 1.5);
            setTimeout(() => { stopAudio(); }, 1600);
          } catch (_) {}
        }
        if (audioElement) {
          try {
            let vol = audioElement.volume;
            const fade = setInterval(() => {
              vol = Math.max(0, vol - 0.05);
              audioElement.volume = vol;
              if (vol <= 0) { clearInterval(fade); audioElement.pause(); }
            }, 75);
          } catch (_) {}
        }
      }

      function tryAutoPlay() {
        initAudio();

        // Browsers block audio autoplay until the user interacts with the page.
        // Retry both the Web Audio context AND the file-based <audio> element
        // on the first genuine interaction, otherwise 'file' mode audio never starts.
        const resume = () => {
          if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume().catch(() => {});
          }
          if (audioElement && audioElement.paused) {
            audioElement.play().catch(() => {});
          }
          document.removeEventListener('click', resume);
          document.removeEventListener('touchstart', resume);
          document.removeEventListener('keydown', resume);
        };
        document.addEventListener('click', resume);
        document.addEventListener('touchstart', resume);
        document.addEventListener('keydown', resume);
      }

      function setupVideo() {
        if (VIDEO_URL) {
          endVideo.loop = false; // play once, never repeat
          endVideo.src = VIDEO_URL;
          endVideo.load();
          endVideo.muted = false;

          // once the video finishes, stop everything and hold on a pure black screen
          endVideo.addEventListener('ended', () => {
            endVideo.pause();
            endVideo.style.opacity = '0';
          });
        }
      }

      function init() {
        setAppHeight();
        renderSlides();
        goTo(0, true);
        startAutoScroll();
        tryAutoPlay();
        setupVideo();
      }

      init();

      window.__slideshow = { goTo, next, setHold, currentIndex: () => currentIndex };

    })();
  </script>

</body>
</html>
