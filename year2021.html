<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>✨ 2021 – Love Story ✨</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100dvh;
            background: url('images/background.png') no-repeat center center/cover, #1a0a1a;
            background-color: #1a0a1a;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
            background-position: center;
        }

        /* Animated gradient overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,182,193,0.25), rgba(173,216,230,0.2), rgba(255,223,186,0.2), rgba(192,132,252,0.2));
            background-size: 400% 400%;
            animation: gradientShift 20s infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Starry night */
        #stars {
            position: fixed; top:0; left:0;
            width:100%; height:100%;
            pointer-events:none; z-index:0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity:0.3; transform:scale(1); }
            50% { opacity:1; transform:scale(1.3); }
        }
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot 1.5s linear infinite;
            opacity: 0;
        }
        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0); opacity:1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(100px); opacity:0; }
        }

        /* Ambient floating texts & hearts */
        .ambient-layer {
            position: fixed; top:0; left:0;
            width:100%; height:100%;
            pointer-events:none; z-index:1;
            overflow:hidden;
        }
        .ambient-text, .ambient-heart, .ambient-petal {
            position: absolute;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.25);
            animation: drift 12s linear infinite;
            white-space: nowrap;
        }
        .ambient-heart { font-size: 2rem; }
        .ambient-petal { font-size: 1.5rem; }
        @keyframes drift {
            0% { transform: translateY(110vh) rotate(0deg); opacity:0; }
            10% { opacity:1; }
            90% { opacity:1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity:0; }
        }

        /* Main container */
        .page-container {
            position: relative; z-index:2;
            width:100%; max-width:750px;
            height: 100%;
            margin:0 auto;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap: 0.6rem;
            padding: 0.5rem;
        }

        /* Birthday banner */
        .birthday-banner {
            background: linear-gradient(135deg, #ff006e, #ffbe0b);
            color:#fff;
            font-family: 'Playfair Display', serif;
            font-weight:800;
            font-size: clamp(0.9rem, 4vw, 1.8rem);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 0 40px rgba(255,0,110,0.6), 0 0 80px rgba(255,190,11,0.4);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: bannerGlow 2.5s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            z-index:3;
            flex-shrink: 0;
            text-align: center;
            white-space: normal;
            word-break: break-word;
            max-width: 85%;
            line-height: 1.2;
        }
        @keyframes bannerGlow {
            0%,100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.3); transform: scale(1.02); }
        }

        /* Glassmorphism book card */
        .book-card {
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2), 0 0 40px rgba(255,182,193,0.4);
            padding: 1.2rem 1.5rem;
            position: relative;
            border: 2px solid transparent;
            transition: transform 0.4s ease;
            width:100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            flex: 1;
            perspective: 1500px;
            overflow: hidden;
            max-height: calc(100dvh - 100px);
        }
        /* Animated gradient border */
        .book-card::after {
            content:'';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 44px;
            background: conic-gradient(from 0deg, #ff6b6b, #ffd93d, #a0e7e5, #ff6b6b);
            z-index: -1;
            animation: rotateGlow 5s linear infinite;
            filter: blur(8px);
            opacity:0.9;
        }
        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Book spine */
        .book-card::before {
            content: "";
            position: absolute;
            left:0; top:0;
            width:10px; height:100%;
            background: linear-gradient(to right, rgba(139,90,43,0.3), transparent);
            border-radius: 40px 0 0 40px;
            pointer-events: none;
        }

        /* Page flip animation */
        .book-card.flip {
            animation: pageFlip 0.7s ease-out;
        }
        @keyframes pageFlip {
            0% { transform: rotateY(0); opacity:0.9; }
            30% { transform: rotateY(-5deg) scale(0.98); }
            60% { transform: rotateY(3deg) scale(1.01); }
            100% { transform: rotateY(0); opacity:1; }
        }

        .year-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3rem, 5vw, 2rem);
            text-align: center;
            background: linear-gradient(135deg, #d64161, #ff7e5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            flex-shrink: 0;
        }

        .page-content {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.7rem, 3vw, 1rem);
            line-height: 1.5;
            text-align: justify;
            color: #2c1e1a;
            white-space: pre-wrap;
            word-break: break-word;
            flex: 1;
            padding-right: 3px;
            overflow-y: auto;
        }
        .typewriter-cursor {
            border-right: 2px solid #d64161;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%,100% { border-color: transparent; }
            50% { border-color: #d64161; }
        }

        /* Polaroid memory photos */
        .memory-gallery {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .polaroid {
            background: #fff;
            padding: 0.3rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 6px;
            transform: rotate(-2deg);
            transition: transform 0.3s;
            width: clamp(60px, 18vw, 110px);
            height: auto;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .polaroid:nth-child(even) { transform: rotate(1.5deg); }
        .polaroid:hover { transform: scale(1.05) rotate(0); }
        .polaroid img {
            width: 100%;
            height: 80%;
            object-fit: cover;
            border-radius: 4px;
        }
        .polaroid .caption {
            font-size: clamp(0.4rem, 1.2vw, 0.65rem);
            margin-top: 0.1rem;
            color: #5e2a2f;
            font-weight: 600;
        }

        /* Cake between images and text */
        .cake-wrapper {
            text-align: right;
            position: relative;
            margin-bottom: -0.5rem;
            flex-shrink: 0;
        }
        .cake-icon {
            display: inline-block;
            position: relative;
            font-size: 2rem;
            cursor: pointer;
            filter: drop-shadow(0 0 10px gold);
            animation: cakeBounce 2s infinite alternate;
        }
        @keyframes cakeBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }
        .cake-icon .flame {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 14px;
            background: radial-gradient(circle, #ffdd00 20%, #ff6b00 90%);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.2s infinite alternate;
            box-shadow: 0 0 10px #ffa500;
            pointer-events: none;
        }
        @keyframes flicker {
            from { transform: translateX(-50%) scale(1); opacity:1; }
            to { transform: translateX(-50%) scale(1.1,0.9); opacity:0.9; }
        }

        /* Progress indicator */
        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .progress-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
            cursor: pointer;
        }
        .progress-dot.active {
            background: gold;
            box-shadow: 0 0 8px gold;
            transform: scale(1.2);
        }

        /* Navigation buttons – deeper visibility */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            flex-shrink: 0;
        }
        .nav-btn {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            flex:1;
            justify-content: center;
            white-space: nowrap;
        }
        .nav-btn:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.75);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .nav-btn:disabled {
            opacity:0.4;
            cursor:not-allowed;
            transform:none;
            box-shadow:none;
        }

        /* Fixed buttons */
        .gift-button {
            position: fixed;
            bottom: 12px; right: 12px;
            z-index: 300;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            width: 45px; height: 45px;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: floatGift 3s infinite alternate;
        }
        @keyframes floatGift {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }
        .gift-button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1) translateY(-6px);
        }

        /* Music button – top right */
        .music-top {
            position: fixed;
            top: 12px; right: 12px;
            z-index: 300;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .music-top:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            margin-left: 4px;
        }
        .bar {
            width: 3px;
            background: #ffb347;
            animation: bounce 0.7s infinite ease-in-out alternate;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.1s; }
        .bar:nth-child(5) { animation-delay: 0.5s; }
        @keyframes bounce {
            to { height: 10px; }
        }

        /* Main menu button */
        .menu-bottom {
            position: fixed;
            bottom: 12px; left: 12px;
            z-index: 300;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .menu-bottom:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Make a Wish popup – single line */
        .wish-popup {
            white-space: nowrap;
            font-size: clamp(1rem, 4vw, 1.5rem);
            padding: 0.8rem 1.5rem;
        }

        /* Welcome screen */
        .welcome-overlay {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .welcome-text {
            font-size: clamp(2rem, 8vw, 3rem);
            color: gold;
            font-family: 'Playfair Display', serif;
            animation: welcomeZoom 1.5s ease-out;
        }
        @keyframes welcomeZoom {
            0% { transform: scale(0.5); opacity:0; }
            50% { opacity:1; }
            100% { transform: scale(1); }
        }

        /* Responsive fine-tuning */
        @media (max-width: 700px) {
            .book-card {
                padding: 0.8rem 0.8rem;
                max-height: calc(100dvh - 140px);
            }
            .nav-btn {
                padding: 0.35rem 0.5rem;
                font-size: 0.75rem;
            }
            .polaroid {
                width: clamp(50px, 16vw, 80px);
            }
            .music-top, .menu-bottom {
                padding: 0.35rem 0.5rem;
                font-size: 0.7rem;
            }
            .gift-button {
                width: 38px; height: 38px;
                font-size: 1.3rem;
            }
            .cake-icon {
                font-size: 1.6rem;
            }
            .birthday-banner {
                font-size: 0.8rem;
                padding: 0.4rem 1rem;
                max-width: 75%;
            }
        }
        @media (max-width: 450px) {
            .page-content {
                font-size: 0.72rem;
                line-height: 1.4;
            }
            .year-title {
                font-size: 1.4rem;
            }
            .nav-btn {
                font-size: 0.7rem;
                padding: 0.3rem 0.4rem;
            }
            .music-top, .menu-bottom {
                font-size: 0.65rem;
                padding: 0.3rem 0.4rem;
            }
            .gift-button {
                width: 34px; height: 34px;
                font-size: 1.2rem;
            }
            .cake-icon {
                font-size: 1.4rem;
            }
            .birthday-banner {
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
                max-width: 70%;
            }
        }
        @media (max-width: 360px) {
            .polaroid {
                width: 55px;
            }
            .cake-icon {
                font-size: 1.2rem;
            }
            .page-content {
                font-size: 0.68rem;
            }
            .birthday-banner {
                font-size: 0.65rem;
                max-width: 65%;
            }
        }
    </style>
</head>
<body>
    <!-- Welcome screen -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-text">✨ Welcome to 2021 ✨</div>
    </div>

    <!-- Starry background -->
    <div id="stars"></div>

    <!-- Ambient floating words, hearts, petals -->
    <div class="ambient-layer" id="ambientLayer"></div>

    <!-- Confetti canvas -->
    <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;"></canvas>

    <!-- Main content -->
    <div class="page-container">
        <!-- Birthday banner (typewriter) -->
        <div class="birthday-banner" id="birthdayBanner"></div>

        <div class="book-card" id="bookCard">
            <div class="year-title">✨ 2021 ✨</div>

            <!-- Polaroid memory photos -->
            <div class="memory-gallery">
                <div class="polaroid"><img src="https://picsum.photos/id/104/200/250" alt="Memory"><div class="caption">Smile 🌟</div></div>
                <div class="polaroid"><img src="https://picsum.photos/id/169/200/250" alt="Memory"><div class="caption">Joy 💖</div></div>
                <div class="polaroid"><img src="https://picsum.photos/id/128/200/250" alt="Memory"><div class="caption">Love ✨</div></div>
            </div>

            <!-- Cake between images and text -->
            <div class="cake-wrapper">
                <div class="cake-icon" id="cakeIcon">
                    🎂
                    <div class="flame" id="flame"></div>
                </div>
            </div>

            <div class="page-content" id="pageText"></div>

            <div class="progress-indicator" id="progressIndicator"></div>

            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn"><i data-lucide="chevron-left"></i> Previous</button>
                <button id="nextBtn" class="nav-btn">Next <i data-lucide="chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Surprise gift box -->
    <div class="gift-button" id="giftBtn" title="Open surprise!">🎁</div>

    <!-- Music button with visualizer (top-right) -->
    <button id="musicToggleBtn" class="music-top">
        <i data-lucide="music"></i> <span id="musicLabel">Music Off</span>
        <div class="visualizer" id="visualizerBars" style="display:none;">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </button>

    <!-- Back to main menu -->
    <a href="index.html" class="menu-bottom"><i data-lucide="home"></i> Main Menu</a>

    <!-- Audio -->
    <audio id="bgAudio" loop preload="auto">
        <source src="audio/soulprodmusic-happy-birthday-220024.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== GLOBAL PROTECTION ==========
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };

        // ========== WELCOME SCREEN ==========
        setTimeout(() => {
            const overlay = document.getElementById('welcomeOverlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }
        }, 2000);

        // ========== TYPEWRITER FOR BIRTHDAY BANNER ==========
        const bannerText = "🎂 Happy Birthday Princess 🎂";
        const bannerEl = document.getElementById('birthdayBanner');
        let bannerIdx = 0;
        function typeBanner() {
            if (bannerEl && bannerIdx < bannerText.length) {
                bannerEl.textContent += bannerText.charAt(bannerIdx);
                bannerIdx++;
                setTimeout(typeBanner, 100);
            }
        }
        setTimeout(typeBanner, 2200);

        // ========== STORY PAGES ==========
        const storyPages = [
            "The year 2021 began with a gentle whisper of hope. You stepped into a new chapter, full of dreams and soft melodies. Every day was a chance to grow, to love, to heal. Spring brought laughter that echoed through the halls. You shared cake with old friends and made new memories that would never fade. Your smile became the brightest star.",
            "Summer arrived with warm winds and endless sunsets. You discovered the magic of small moments – a handwritten note, a surprise call, a hug that said everything. Autumn painted the world in gold and crimson. You held hands with destiny and walked through crunchy leaves, feeling grateful for every heartbeat. 2021 was the prologue of your beautiful story.",
            "Winter wrapped you in a cozy blanket of love. By the fireplace, you whispered wishes that came true. The year ended not with sorrow, but with the promise of more joy. And so, 2021 became the foundation of everything wonderful. May you always remember: this was the year your heart learned to fly. 💖"
        ];

        let currentPage = 0;
        const textDiv = document.getElementById('pageText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const bookCard = document.getElementById('bookCard');
        const progressIndicator = document.getElementById('progressIndicator');

        function buildProgress() {
            if (!progressIndicator) return;
            progressIndicator.innerHTML = '';
            storyPages.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (idx === currentPage) dot.classList.add('active');
                dot.addEventListener('click', () => {
                    if (idx !== currentPage) {
                        currentPage = idx;
                        updatePage(true);
                    }
                });
                progressIndicator.appendChild(dot);
            });
        }

        let typeInterval = null;
        let isTyping = false;

        function typeText(element, text, callback) {
            if (!element) return;
            if (typeInterval) clearInterval(typeInterval);
            element.innerHTML = '';
            element.classList.add('typewriter-cursor');
            let index = 0;
            isTyping = true;
            typeInterval = setInterval(() => {
                if (index < text.length) {
                    element.innerHTML += text.charAt(index);
                    index++;
                } else {
                    clearInterval(typeInterval);
                    element.classList.remove('typewriter-cursor');
                    isTyping = false;
                    if (callback) callback();
                }
            }, 20);
        }

        function updatePage(animate = true) {
            if (isTyping) {
                if (typeInterval) clearInterval(typeInterval);
                isTyping = false;
            }
            typeText(textDiv, storyPages[currentPage], () => {});

            if (animate && bookCard) {
                bookCard.classList.add('flip');
                setTimeout(() => bookCard.classList.remove('flip'), 700);
            }

            if (prevBtn) {
                prevBtn.disabled = (currentPage === 0);
                prevBtn.style.opacity = prevBtn.disabled ? '0.4' : '1';
            }
            if (nextBtn) {
                nextBtn.disabled = (currentPage === storyPages.length - 1);
                nextBtn.style.opacity = nextBtn.disabled ? '0.4' : '1';
            }

            buildProgress();
        }

        if (prevBtn) prevBtn.addEventListener('click', () => {
            if (currentPage > 0) { currentPage--; updatePage(true); }
        });
        if (nextBtn) nextBtn.addEventListener('click', () => {
            if (currentPage < storyPages.length - 1) { currentPage++; updatePage(true); }
        });

        updatePage(false);

        // ========== STARS & SHOOTING STARS ==========
        function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
            setInterval(() => {
                const shooter = document.createElement('div');
                shooter.className = 'shooting-star';
                shooter.style.top = Math.random() * 50 + '%';
                container.appendChild(shooter);
                setTimeout(() => shooter.remove(), 1500);
            }, 5000);
        }
        createStars();

        // ========== AMBIENT FLOATING ELEMENTS ==========
        function createAmbient() {
            const layer = document.getElementById('ambientLayer');
            if (!layer) return;
            const words = ["Happy Birthday", "Best Wishes", "Forever Young", "Dream Big", "Make A Wish", "Celebrate", "Love", "Joy", "2021"];
            const hearts = ["💖", "✨", "💕", "🌸", "🌟"];
            const petals = ["🌸", "💮", "🌷", "🪷"];
            function spawn() {
                const el = document.createElement('div');
                const r = Math.random();
                if (r < 0.4) {
                    el.className = 'ambient-text';
                    el.textContent = words[Math.floor(Math.random() * words.length)];
                } else if (r < 0.8) {
                    el.className = 'ambient-heart';
                    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                } else {
                    el.className = 'ambient-petal';
                    el.textContent = petals[Math.floor(Math.random() * petals.length)];
                }
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (10 + Math.random() * 10) + 's';
                layer.appendChild(el);
                setTimeout(() => el.remove(), 15000);
            }
            setInterval(spawn, 1500);
            for (let i = 0; i < 10; i++) setTimeout(spawn, i * 300);
        }
        createAmbient();

        // ========== CONFETTI ==========
        function launchConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#ffb7c5', '#ffd700', '#a0e7e5', '#ff6b6b', '#ffbe0b', '#c084fc'];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 1) * 10 - 5,
                    life: 1,
                    decay: 0.02
                });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= p.decay;
                    if (p.life > 0) alive = true;
                });
                if (alive) requestAnimationFrame(animate);
            }
            animate();
        }
        // Small initial confetti
        setTimeout(launchConfetti, 800);

        // ========== INTERACTIVE CAKE ==========
        const cakeIcon = document.getElementById('cakeIcon');
        const flame = document.getElementById('flame');
        if (cakeIcon) {
            cakeIcon.addEventListener('click', () => {
                if (flame) flame.style.display = 'none';
                const wish = document.createElement('div');
                wish.className = 'wish-popup';
                wish.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.9); border-radius:30px; z-index:400; color:#d64161; box-shadow:0 0 30px gold; animation: pop 0.5s;';
                wish.innerHTML = '✨ Make a Wish ✨';
                document.body.appendChild(wish);
                setTimeout(() => wish.remove(), 2000);
                for (let i = 0; i < 20; i++) {
                    const spark = document.createElement('div');
                    spark.style.cssText = 'position:fixed; width:6px; height:6px; background:gold; border-radius:50%; z-index:401; left:' + (Math.random()*100) + '%; top:' + (Math.random()*100) + '%; animation: sparkle 0.8s forwards;';
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 800);
                }
                setTimeout(() => { if (flame) flame.style.display = 'block'; }, 4000);
            });
        }

        // ========== SURPRISE GIFT ==========
        const giftBtn = document.getElementById('giftBtn');
        const surprises = ["You are amazing 💖", "Keep smiling ✨", "Best birthday ever 🎂", "Wish upon a star 🌟", "You're the queen today! 👑"];
        if (giftBtn) {
            giftBtn.addEventListener('click', () => {
                const msg = surprises[Math.floor(Math.random() * surprises.length)];
                const toast = document.createElement('div');
                toast.style.cssText = 'position:fixed; bottom:80px; right:20px; background:white; color:#d64161; padding:0.8rem 1.5rem; border-radius:40px; font-weight:700; z-index:400; box-shadow:0 10px 25px rgba(0,0,0,0.3); animation: slideUp 0.5s;';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            });
        }

        // ========== MUSIC CONTROL WITH VISUALIZER ==========
        const audio = document.getElementById('bgAudio');
        const musicBtn = document.getElementById('musicToggleBtn');
        const musicLabel = document.getElementById('musicLabel');
        const visualizerBars = document.getElementById('visualizerBars');
        let isMusicPlaying = false;

        if (audio) {
            audio.volume = 0.2;
            // Fix for mobile: ensure audio can be played on user interaction
            audio.load();
        }

        if (musicBtn) {
            musicBtn.addEventListener('click', () => {
                if (!audio) return;
                if (isMusicPlaying) {
                    audio.pause();
                    if (musicLabel) musicLabel.innerText = "Music Off";
                    if (visualizerBars) visualizerBars.style.display = 'none';
                } else {
                    audio.play().then(() => {
                        // play succeeded
                    }).catch(e => {
                        console.log("Audio play failed:", e);
                        // Even if play fails (user hasn't interacted enough), we still show visualizer
                    });
                    if (musicLabel) musicLabel.innerText = "Music On";
                    if (visualizerBars) visualizerBars.style.display = 'flex';
                }
                isMusicPlaying = !isMusicPlaying;
            });
        }

        // Initialize Lucide icons (small delay ensures DOM ready)
        setTimeout(() => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
