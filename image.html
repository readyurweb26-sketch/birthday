<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Birthday Gallery ✨</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
    <style>
        /* ----- RESET & BODY ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: "Georgia", "Times New Roman", serif;
            background: linear-gradient(135deg, #0a0015, #1a0033, #0d0020);
            min-height: 100vh;
            position: relative;
        }

        /* ----- PARTICLE BACKGROUND CANVAS ----- */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ----- CAROUSEL ----- */
        .carousel {
            position: relative;
            z-index: 1;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }

        .carousel-item {
            --items: 10;
            --width: clamp(160px, 32vw, 320px);
            --height: clamp(210px, 42vw, 420px);
            --x: calc(var(--active) * 800%);
            --y: calc(var(--active) * 200%);
            --rot: calc(var(--active) * 120deg);
            --opacity: calc(var(--zIndex) / var(--items) * 3 - 2);
            overflow: hidden;
            position: absolute;
            z-index: var(--zIndex);
            width: var(--width);
            height: var(--height);
            margin: calc(var(--height) * -0.5) 0 0 calc(var(--width) * -0.5);
            border-radius: 16px;
            top: 50%;
            left: 50%;
            user-select: none;
            transform-origin: 0% 100%;
            box-shadow: 0 15px 60px 15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.1);
            background: black;
            pointer-events: all;
            transform: translate(var(--x), var(--y)) rotate(var(--rot));
            transition: transform 0.8s cubic-bezier(0, 0.02, 0, 1), box-shadow 0.3s ease;
        }

        .carousel-item:hover {
            box-shadow: 0 20px 70px 20px rgba(255, 215, 0, 0.15), 0 0 0 2px rgba(255, 215, 0, 0.3);
        }

        .carousel-item .carousel-box {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s cubic-bezier(0, 0.02, 0, 1);
            opacity: var(--opacity);
            font-family: "Georgia", "Times New Roman", serif;
        }

        .carousel-item .carousel-box::before {
            content: "";
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0) 35%, rgba(0, 0, 0, 0) 55%, rgba(0, 0, 0, 0.6));
            pointer-events: none;
        }

        .carousel-item .title {
            position: absolute;
            z-index: 2;
            color: #fff;
            bottom: 18px;
            left: 18px;
            transition: opacity 0.8s cubic-bezier(0, 0.02, 0, 1);
            font-size: clamp(16px, 2.5vw, 26px);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.4);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .carousel-item .num {
            position: absolute;
            z-index: 2;
            color: rgba(255, 255, 255, 0.9);
            top: 10px;
            left: 18px;
            transition: opacity 0.8s cubic-bezier(0, 0.02, 0, 1);
            font-size: clamp(18px, 8vw, 70px);
            font-weight: 900;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
            opacity: 0.7;
            font-family: "Georgia", serif;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Glow on active item */
        .carousel-item.active-glow {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25), 0 15px 60px 15px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.15);
        }

        /* ----- SOCIAL ICONS (no Bips link) ----- */
        .social {
            position: fixed;
            z-index: 10;
            bottom: 22px;
            right: 80px;
            color: #fff;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .social:hover {
            opacity: 0.7;
        }
        .social a {
            display: inline-block;
            margin-left: 4px;
        }
        .social svg {
            --fill: #fff;
            width: 32px;
            height: 32px;
        }

        /* ----- CURSOR ----- */
        .cursor {
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            --size: 40px;
            width: var(--size);
            height: var(--size);
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin: calc(var(--size) * -0.5) 0 0 calc(var(--size) * -0.5);
            transition: transform 0.85s cubic-bezier(0, 0.02, 0, 1);
            display: none;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        @media (pointer: fine) {
            .cursor {
                display: block;
            }
        }
        .cursor2 {
            --size: 3px;
            transition-duration: 0.6s;
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.3);
            border-width: 1px;
        }

        /* ----- BACK TO 2025 BUTTON ----- */
        .back-2025-btn {
            position: fixed;
            bottom: 22px;
            right: 22px;
            z-index: 50;
            background: rgba(255, 200, 210, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 200, 210, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .back-2025-btn:hover {
            background: rgba(255, 200, 210, 0.3);
            transform: scale(1.04);
            color: #fff;
            border-color: rgba(255, 200, 210, 0.4);
            box-shadow: 0 6px 30px rgba(255, 200, 210, 0.15);
        }

        /* ----- MUSIC SYNC INDICATOR (subtle) ----- */
        .music-sync-indicator {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 50;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.25);
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
            pointer-events: none;
            opacity: 0.6;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            .carousel-item {
                --width: clamp(120px, 45vw, 200px);
                --height: clamp(160px, 55vw, 260px);
            }
            .carousel-item .title {
                font-size: clamp(12px, 3vw, 16px);
                bottom: 12px;
                left: 12px;
            }
            .carousel-item .num {
                font-size: clamp(14px, 10vw, 40px);
                top: 6px;
                left: 12px;
            }
            .back-2025-btn {
                bottom: 14px;
                right: 14px;
                padding: 0.4rem 0.9rem;
                font-size: 0.7rem;
            }
            .social {
                bottom: 16px;
                right: 70px;
            }
            .social svg {
                width: 24px;
                height: 24px;
            }
            .music-sync-indicator {
                top: 10px;
                right: 10px;
                font-size: 0.55rem;
                padding: 0.15rem 0.5rem;
            }
        }

        @media (max-width: 450px) {
            .carousel-item {
                --width: clamp(100px, 50vw, 160px);
                --height: clamp(140px, 60vw, 220px);
            }
        }
    </style>
</head>

    <script>
        // ═══ DISABLE RIGHT-CLICK & DEVTOOLS KEYS ═══
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
        return false;
    }
};
        // ================================================================
        // 1. CAROUSEL LOGIC (original)
        // ================================================================
        let progress = 50;
        let startX = 0;
        let active = 0;
        let isDown = false;

        const speedWheel = 0.02;
        const speedDrag = -0.1;

        const getZindex = (array, index) => (array.map((_, i) => (index === i) ? array.length : array.length - Math.abs(index - i)));

        const $items = document.querySelectorAll('.carousel-item');
        const $cursors = document.querySelectorAll('.cursor');

        const displayItems = (item, index, active) => {
            const zIndex = getZindex([...$items], active)[index];
            item.style.setProperty('--zIndex', zIndex);
            item.style.setProperty('--active', (index - active) / $items.length);
            item.classList.toggle('active-glow', index === active);
        };

        const animate = () => {
            progress = Math.max(0, Math.min(progress, 100));
            active = Math.floor(progress / 100 * ($items.length - 1));
            $items.forEach((item, index) => displayItems(item, index, active));
        };
        animate();

        $items.forEach((item, i) => {
            item.addEventListener('click', () => {
                progress = (i / $items.length) * 100 + 10;
                animate();
            });
        });

        const handleWheel = e => {
            const wheelProgress = e.deltaY * speedWheel;
            progress = progress + wheelProgress;
            animate();
        };

        const handleMouseMove = (e) => {
            if (e.type === 'mousemove') {
                $cursors.forEach(($cursor) => {
                    $cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                });
            }
            if (!isDown) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX) || 0;
            const mouseProgress = (x - startX) * speedDrag;
            progress = progress + mouseProgress;
            startX = x;
            animate();
        };

        const handleMouseDown = e => {
            isDown = true;
            startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        };

        const handleMouseUp = () => {
            isDown = false;
        };

        document.addEventListener('mousewheel', handleWheel);
        document.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        document.addEventListener('touchstart', handleMouseDown);
        document.addEventListener('touchmove', handleMouseMove);
        document.addEventListener('touchend', handleMouseUp);

        // ================================================================
        // 2. PARTICLE BACKGROUND (beautiful glow)
        // ================================================================
        const pCanvas = document.getElementById('particlesCanvas');
        const pCtx = pCanvas.getContext('2d');
        let pw, ph;
        let particles = [];

        function resizeParticles() {
            pw = window.innerWidth;
            ph = window.innerHeight;
            pCanvas.width = pw;
            pCanvas.height = ph;
        }
        resizeParticles();
        window.addEventListener('resize', resizeParticles);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * pw;
                this.y = Math.random() * ph;
                this.size = 1.5 + Math.random() * 3;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = 0.3 + Math.random() * 0.4;
                this.color = `hsla(${Math.random() * 60 + 320}, 80%, 70%, ${this.opacity})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > pw) this.speedX *= -1;
                if (this.y < 0 || this.y > ph) this.speedY *= -1;
            }
            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fillStyle = this.color;
                pCtx.fill();
                // glow
                pCtx.shadowColor = 'rgba(255,215,0,0.2)';
                pCtx.shadowBlur = 12;
                pCtx.fill();
                pCtx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animateParticles() {
            pCtx.clearRect(0, 0, pw, ph);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            // connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        pCtx.beginPath();
                        pCtx.moveTo(particles[i].x, particles[i].y);
                        pCtx.lineTo(particles[j].x, particles[j].y);
                        pCtx.strokeStyle = `rgba(255,215,0,${0.08 * (1 - dist / 120)})`;
                        pCtx.lineWidth = 0.6;
                        pCtx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ================================================================
        // 3. MUSIC SYNC with year2025.html (localStorage)
        //    Only plays when 2025.html music is ON.
        //    No independent toggle; indicator reflects state.
        // ================================================================
        const audio = document.getElementById('bgAudio');
        const indicator = document.getElementById('musicIndicator');
        let isMusicPlaying = false;

        function syncMusicState() {
            const savedState = localStorage.getItem('musicPlaying');
            if (savedState === 'true') {
                audio.play().catch(e => console.log('Audio play error:', e));
                isMusicPlaying = true;
                indicator.textContent = '♫ on';
                indicator.style.color = 'rgba(255,215,0,0.7)';
            } else {
                audio.pause();
                isMusicPlaying = false;
                indicator.textContent = '♫ off';
                indicator.style.color = 'rgba(255,255,255,0.25)';
                if (!savedState) {
                    // First time: set default off
                    localStorage.setItem('musicPlaying', 'false');
                }
            }
        }

        // Listen for changes from other tabs (storage event)
        window.addEventListener('storage', (e) => {
            if (e.key === 'musicPlaying') {
                syncMusicState();
            }
        });

        // Also when page becomes visible again (tab switch)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                syncMusicState();
            }
        });

        // On page load
        window.addEventListener('load', () => {
            syncMusicState();
            // Also set initial state if it's the first time
            if (localStorage.getItem('musicPlaying') === null) {
                localStorage.setItem('musicPlaying', 'false');
                syncMusicState();
            }
        });

        console.log('🎂 image.html – music synced with 2025.html via localStorage.');
    </script>
</body>
</html>
