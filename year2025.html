<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>✨ 2025 – A Memory Journey ✨</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpeg">

    <!-- ===== GOOGLE FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- ===== LUCIDE ICONS ===== -->
    <script src="https://unpkg.com/lucide@latest">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --font-heading: 'Playfair Display', 'Georgia', serif;
            --font-body: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'Space Mono', 'Courier New', monospace;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.14);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.12);
            --gold: #ffd700;
            --gold-glow: 0 0 25px rgba(255, 215, 0, 0.35);
            --transition-speed: 0.4s;
            /* Real viewport height, set by JS, with vh fallback below */
            --vh: 1vh;
        }

        html {
            height: 100%;
            /* HARD SAFETY NET: nothing can ever cause horizontal scroll */
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            height: 100dvh;
            max-height: 100vh;
            max-height: calc(var(--vh, 1vh) * 100);
            max-height: 100dvh;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            overflow-x: hidden;
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            position: relative;
            cursor: default;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
            touch-action: pan-y;
        }

        /* ===== PAGE TRANSITION ===== */
        body.page-exit {
            animation: pageExit 0.5s cubic-bezier(0.55, 0, 0.1, 1) forwards;
        }
        @keyframes pageExit {
            0% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
            100% {
                opacity: 0;
                filter: blur(20px);
                transform: scale(1.04);
            }
        }
        body.page-enter {
            animation: pageEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes pageEnter {
            0% {
                opacity: 0;
                filter: blur(15px);
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
        }

        /* ===== RESPONSIVE BACKGROUND VIDEO ===== */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            object-fit: cover;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: #000;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        #bgVideo.visible {
            opacity: 1;
        }

        /* ===== AURORA GRADIENT OVERLAY ===== */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.18), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.16), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(180, 100, 255, 0.10), transparent 50%);
            mix-blend-mode: screen;
            animation: floatAurora 22s infinite alternate ease-in-out;
            opacity: 0;
            transition: opacity 1.2s ease;
            will-change: transform;
        }
        .aurora.visible {
            opacity: 1;
        }
        @keyframes floatAurora {
            0% {
                transform: scale(1) rotate(0deg) translate(0, 0);
            }
            25% {
                transform: scale(1.08) rotate(1deg) translate(1%, -1%);
            }
            50% {
                transform: scale(1.03) rotate(-0.6deg) translate(-1%, 1%);
            }
            75% {
                transform: scale(1.1) rotate(0.8deg) translate(0.5%, 0.5%);
            }
            100% {
                transform: scale(1.05) rotate(-0.4deg) translate(-0.5%, -0.5%);
            }
        }

        /* ===== MOUSE SPOTLIGHT (Desktop only) ===== */
        .mouse-spotlight {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.03) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            will-change: left, top;
        }
        .mouse-spotlight.active {
            opacity: 1;
        }

        /* ===== AMBIENT PARTICLES CANVAS ===== */
        #ambientParticlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #ambientParticlesCanvas.visible {
            opacity: 1;
        }

        /* ===== ENTRY OVERLAY ===== */
        #entryOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.78);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease, backdrop-filter 1.2s ease;
            pointer-events: none;
            backdrop-filter: blur(0px);
        }
        #entryOverlay.hidden {
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(30px);
        }

        .welcome-text {
            font-family: var(--font-heading);
            font-size: clamp(2.8rem, 13vw, 7rem);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00, 0 0 100px #ff4500, 0 0 150px rgba(255, 100, 50, 0.5);
            animation: cinematicReveal 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: scale(0.6);
            filter: blur(20px);
            text-align: center;
            padding: 0 1.5rem;
            letter-spacing: 3px;
            line-height: 1.1;
        }
        @keyframes cinematicReveal {
            0% {
                opacity: 0;
                transform: scale(0.6);
                filter: blur(20px);
            }
            55% {
                opacity: 0.9;
                filter: blur(2px);
                transform: scale(1.03);
            }
            75% {
                transform: scale(0.99);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }
        }
        .welcome-sub {
            font-family: var(--font-body);
            font-size: clamp(0.9rem, 3vw, 1.5rem);
            color: #ffefcf;
            margin-top: 1.2rem;
            letter-spacing: 1px;
            animation: fadeInUp 3s ease 0.5s forwards;
            opacity: 0;
            transform: translateY(25px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 0.85;
                transform: translateY(0);
            }
        }

        /* ===== CONFETTI CANVAS ===== */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        /* ===== PREMIUM MUSIC PLAYER ===== */
        .music-player {
            position: fixed;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            box-shadow: var(--glass-shadow);
            opacity: 0;
            transform: translateX(-50%) translateY(-25px);
            transition: all var(--transition-speed) ease;
            pointer-events: none;
            width: min(260px, calc(100vw - 24px));
            max-width: calc(100vw - 24px);
            font-family: var(--font-body);
        }
        .music-player.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .music-player .song-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            min-width: 0;
        }
        .music-player .song-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .music-player .progress-wrap {
            flex: 1;
            min-width: 30px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .music-player .progress-bar {
            height: 100%;
            background: var(--gold);
            border-radius: 10px;
            transition: width 0.3s linear;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .music-player .time-display {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-mono);
            white-space: nowrap;
            min-width: 48px;
            text-align: center;
            flex-shrink: 0;
        }
        .music-player .play-pause-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
            color: #fff;
        }
        .music-player .play-pause-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: var(--gold-glow);
        }
        .music-player .play-pause-btn:active {
            transform: scale(0.92);
        }
        .music-player .play-pause-btn i {
            width: 16px;
            height: 16px;
        }

        /* ===== MAIN CONTENT (locked height, no scroll) ===== */
        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            height: 100dvh;
            padding: 0.8rem;
            width: 100%;
            max-width: min(950px, 100vw);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            gap: 0.6rem;
            overflow: hidden;
            box-sizing: border-box;
        }
        .main-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== MEMORY PROGRESS INDICATOR (compact) ===== */
        .progress-indicator {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.6s ease 0.3s;
            font-family: var(--font-body);
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .main-content.visible .progress-indicator {
            opacity: 1;
            transform: translateY(0);
        }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .progress-dot.visited {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            animation: dotPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes dotPop {
            0% { transform: scale(0.5); }
            60% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .progress-line {
            width: 12px;
            height: 1px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .progress-line.done {
            background: rgba(255, 215, 0, 0.5);
        }
        .progress-line.done::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            animation: lineFill 0.6s ease forwards;
        }
        @keyframes lineFill {
            to { transform: scaleX(1); }
        }

        /* ===== HERO PROFILE CARD (smaller, tighter) ===== */
        .hero-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 0.6rem 1rem;
            box-shadow: var(--glass-shadow);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s;
            max-width: min(320px, calc(100% - 1rem));
            width: 90%;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .main-content.visible .hero-card {
            opacity: 1;
            transform: translateY(0);
            animation: heroFloat 5s ease-in-out 1.2s infinite;
        }
        @keyframes heroFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .hero-card .profile-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            flex-shrink: 0;
            background: linear-gradient(135deg, #ff99ae, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
            animation: ringPulse 3.5s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 26px rgba(255, 215, 0, 0.4); }
        }
        .hero-card .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .hero-card .profile-img .fallback-icon {
            color: #fff;
            width: 22px;
            height: 22px;
        }
        .hero-card .hero-info {
            min-width: 0;
        }
        .hero-card .hero-info h2 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hero-card .hero-info p {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 0.2rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== TYPEWRITER ===== */
        .typewriter-area {
            text-align: center;
            flex-shrink: 0;
            width: 100%;
            padding: 0 0.5rem;
            box-sizing: border-box;
        }
        .typewriter-text {
            font-family: var(--font-mono);
            font-size: clamp(0.85rem, 3.5vw, 1.8rem);
            font-weight: 700;
            color: #fff5e0;
            text-shadow: 2px 2px 12px rgba(0, 0, 0, 0.8);
            min-height: 38px;
            letter-spacing: 1px;
            word-break: break-word;
        }
        .typewriter-text .cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #ffd700;
            margin-left: 4px;
            animation: blink 0.85s ease-in-out infinite;
            vertical-align: text-bottom;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
        }
        @keyframes blink {
            0%, 45% { opacity: 1; }
            50%, 95% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ===== MODERN CARD NAVIGATION ===== */
        .card-nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            max-width: 600px;
            padding: 0 0.4rem;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .nav-card {
            flex: 1 1 0;
            min-width: 0;
            max-width: 150px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 0.7rem 0.4rem;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.35s ease, box-shadow 0.35s ease;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            opacity: 0;
            transform: translateY(30px) scale(0.92);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .main-content.visible .nav-card {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }
        .main-content.visible .nav-card:nth-child(1) { transition-delay: 0.35s; }
        .main-content.visible .nav-card:nth-child(2) { transition-delay: 0.45s; }
        .main-content.visible .nav-card:nth-child(3) { transition-delay: 0.55s; }
        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.12), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .nav-card:hover::before { opacity: 1; }
        .nav-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45), 0 0 25px rgba(255, 215, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.18);
        }
        .nav-card:active {
            transform: scale(0.94);
            transition: transform 0.15s ease;
        }
        .nav-card .card-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s ease;
            flex-shrink: 0;
        }
        .nav-card:hover .card-icon {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.08) rotate(-4deg);
        }
        .nav-card .card-icon i {
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.8);
            transition: color 0.3s ease;
        }
        .nav-card:hover .card-icon i { color: #ffd700; }
        .nav-card .card-title {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.85);
            transition: color 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .nav-card:hover .card-title { color: #fff; }
        .nav-card .card-subtitle {
            display: none;
        }
        .nav-card.visited-card {
            border-color: rgba(255, 215, 0, 0.3);
        }
        .nav-card.visited-card::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 0.6rem;
            color: #ffd700;
            opacity: 0.8;
            font-weight: 700;
        }

        /* ===== BOTTOM DOCK (visible on all devices) ===== */
        .bottom-dock {
            position: fixed;
            bottom: max(10px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 55;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: var(--glass-shadow);
            opacity: 0;
            transform: translateX(-50%) translateY(30px);
            transition: all var(--transition-speed) ease;
            pointer-events: none;
            max-width: calc(100vw - 24px);
            overflow-x: auto;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .bottom-dock.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .bottom-dock::-webkit-scrollbar { display: none; }
        .bottom-dock .dock-item {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease, background 0.3s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            flex-shrink: 0;
        }
        .bottom-dock .dock-item:hover,
        .bottom-dock .dock-item:active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

<body class="page-enter">

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content" id="mainContent">

        <div class="hero-card" id="heroCard">
            <div class="profile-img" id="profileImgContainer">

                src="images/profile.jpg"
                alt="Profile"
                id="profileImg"
                loading="eager"
                onerror="this.style.display='none';document.getElementById('profileFallback').style.display='flex';"
                style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
                >

                </span>

        <div class="typewriter-area">

        </div>

        <div class="card-nav" id="cardNav">
            <a href="image.html" class="nav-card" data-page="image" data-option="image">
                <div class="card-icon"><i data-lucide="image"></i></div>
                <span class="card-title">Images</span>
                <span class="card-subtitle">Photo gallery</span>
            </a>
            <a href="video.html" class="nav-card" data-page="video" data-option="video">
                <div class="card-icon"><i data-lucide="clapperboard"></i></div>
                <span class="card-title">Videos</span>
                <span class="card-subtitle">Watch moments</span>
            </a>
            <a href="tatti.html" class="nav-card" data-page="tatti" data-option="tatti">
                <div class="card-icon"><i data-lucide="sparkles"></i></div>
                <span class="card-title">Memories</span>
                <span class="card-subtitle">Special collection</span>
            </a>
        </div>
    </div>

    <script>
        // ═══ DISABLE RIGHT-CLICK & DEVTOOLS KEYS ═══
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                return false;
            }
        };

        // ================================================================
        // 0. LUCIDE ICONS INITIALIZATION
        // ================================================================
        function initLucideIcons() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }
        initLucideIcons();
        setTimeout(initLucideIcons, 100);
        setTimeout(initLucideIcons, 500);

        // ================================================================
        // 0b. REAL VIEWPORT HEIGHT FIX (mobile browser UI chrome)
        // ================================================================
        function setRealVH() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setRealVH();
        window.addEventListener('resize', setRealVH);
        window.addEventListener('orientationchange', () => {
            setTimeout(setRealVH, 100);
        });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setRealVH);
        }

        // ================================================================
        // 1. CONFETTI / CRACKER ANIMATION
        // ================================================================
        const confettiCanvas = document.getElementById('confettiCanvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let CW, CH;

        function resizeConfettiCanvas() {
            CW = window.innerWidth;
            CH = window.innerHeight;
            confettiCanvas.width = CW;
            confettiCanvas.height = CH;
        }
        resizeConfettiCanvas();
        window.addEventListener('resize', resizeConfettiCanvas);

        let particles = [];

        function createParticles(count = 120) {
            const colors = ['#ff0', '#f0f', '#0ff', '#f44', '#4f4', '#44f', '#ff8800', '#ff44aa', '#aaff44', '#ffaa00'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 4 + Math.random() * 12;
                particles.push({
                    x: CW / 2 + (Math.random() - 0.5) * 100,
                    y: CH / 2 + (Math.random() - 0.5) * 80,
                    vx: Math.cos(angle) * speed * (0.6 + Math.random() * 0.6),
                    vy: Math.sin(angle) * speed * (0.6 + Math.random() * 0.6) - 2,
                    size: 4 + Math.random() * 10,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: 0.005 + Math.random() * 0.015,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    shape: Math.random() > 0.5 ? 'rect' : 'circle'
                });
            }
        }

        function createSideBurst() {
            const colors = ['#ff0', '#f44', '#4f4', '#44f', '#ff8800', '#ff44aa', '#aaff44'];
            for (let i = 0; i < 20; i++) {
                const side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = Math.random() * CW; y = -20; } else if (side === 1) { x = Math.random() * CW; y = CH + 20; } else if (side === 2) { x = -20; y = Math.random() * CH; } else { x = CW + 20; y = Math.random() * CH; }
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    size: 3 + Math.random() * 8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: 0.008 + Math.random() * 0.015,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    shape: 'rect'
                });
            }
        }

        function animateConfetti() {
            confettiCtx.clearRect(0, 0, CW, CH);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.vx *= 0.99;
                p.vy *= 0.99;
                p.life -= p.decay;
                p.rotation += p.rotSpeed;
                if (p.life <= 0 || p.y > CH + 50 || p.x < -50 || p.x > CW + 50) {
                    particles.splice(i, 1);
                    continue;
                }
                confettiCtx.save();
                confettiCtx.translate(p.x, p.y);
                confettiCtx.rotate(p.rotation * Math.PI / 180);
                confettiCtx.globalAlpha = p.life;
                confettiCtx.fillStyle = p.color;
                if (p.shape === 'rect') {
                    confettiCtx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
                } else {
                    confettiCtx.beginPath();
                    confettiCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    confettiCtx.fill();
                }
                confettiCtx.restore();
            }
            requestAnimationFrame(animateConfetti);
        }

        function startConfetti() {
            createParticles(70);
            setTimeout(() => createSideBurst(), 350);
            setTimeout(() => createParticles(35), 900);
            setTimeout(() => createSideBurst(), 1400);
            animateConfetti();
        }

        // ================================================================
        // 2. AMBIENT FLOATING PARTICLES
        // ================================================================
        const ambientCanvas = document.getElementById('ambientParticlesCanvas');
        const ambientCtx = ambientCanvas.getContext('2d');
        let AW, AH;
        let ambientParticles = [];

        function resizeAmbientCanvas() {
            AW = window.innerWidth;
            AH = window.innerHeight;
            ambientCanvas.width = AW;
            ambientCanvas.height = AH;
        }
        resizeAmbientCanvas();
        window.addEventListener('resize', resizeAmbientCanvas);

        function initAmbientParticles(count = 24) {
            ambientParticles = [];
            for (let i = 0; i < count; i++) {
                ambientParticles.push({
                    x: Math.random() * AW,
                    y: Math.random() * AH,
                    size: 1.5 + Math.random() * 4,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: -(0.2 + Math.random() * 0.6),
                    opacity: 0.2 + Math.random() * 0.5,
                    twinkleSpeed: 0.005 + Math.random() * 0.02,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    color: Math.random() > 0.5 ? '255,215,0' : '255,255,255',
                });
            }
        }
        initAmbientParticles();
        window.addEventListener('resize', () => {
            resizeAmbientCanvas();
            initAmbientParticles(24);
        });

        function animateAmbientParticles(timestamp) {
            ambientCtx.clearRect(0, 0, AW, AH);
            for (let i = ambientParticles.length - 1; i >= 0; i--) {
                const p = ambientParticles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.y < -20) { p.y = AH + 20; p.x = Math.random() * AW; }
                if (p.y > AH + 20) { p.y = -20; p.x = Math.random() * AW; }
                if (p.x < -20) p.x = AW + 20;
                if (p.x > AW + 20) p.x = -20;
                const twinkle = Math.sin(timestamp * p.twinkleSpeed + p.twinkleOffset) * 0.3 + 0.7;
                const alpha = p.opacity * twinkle;
                ambientCtx.beginPath();
                ambientCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ambientCtx.fillStyle = `rgba(${p.color},${alpha})`;
                ambientCtx.fill();
            }
            requestAnimationFrame(animateAmbientParticles);
        }

        // ================================================================
        // 3. MOUSE SPOTLIGHT (Desktop only)
        // ================================================================
        const mouseSpotlight = document.getElementById('mouseSpotlight');
        let spotlightActive = false;

        function isDesktop() {
            return window.innerWidth > 768 && !('ontouchstart' in window);
        }

        document.addEventListener('mousemove', function(e) {
            if (!isDesktop()) {
                mouseSpotlight.classList.remove('active');
                return;
            }
            if (!spotlightActive) {
                spotlightActive = true;
                mouseSpotlight.classList.add('active');
            }
            mouseSpotlight.style.left = e.clientX + 'px';
            mouseSpotlight.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseleave', function() {
            mouseSpotlight.classList.remove('active');
            spotlightActive = false;
        });
        window.addEventListener('resize', function() {
            if (!isDesktop()) {
                mouseSpotlight.classList.remove('active');
                spotlightActive = false;
            }
        });

        // ================================================================
        // 4. MAGNETIC HOVER ON NAV CARDS
        // ================================================================
        const navCards = document.querySelectorAll('.nav-card');
        navCards.forEach(card => {
            card.addEventListener('mousemove', function(e) {
                if (!isDesktop()) return;
                const rect = card.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const cx = rect.width / 2;
                const cy = rect.height / 2;
                const deltaX = (mx - cx) / cx;
                const deltaY = (my - cy) / cy;
                card.style.setProperty('--mx', mx + 'px');
                card.style.setProperty('--my', my + 'px');
                card.style.transform = `translateY(-5px) perspective(600px) rotateX(${-deltaY * 5}deg) rotateY(${deltaX * 5}deg)`;
            });
            card.addEventListener('mouseleave', function() {
                card.style.transform = '';
                card.style.setProperty('--mx', '50%');
                card.style.setProperty('--my', '50%');
            });
        });

        // ================================================================
        // 5. PAGE TRANSITION
        // ================================================================
        function navigateWithTransition(url) {
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = url;
            }, 450);
        }

        document.querySelectorAll('.nav-card, .bottom-dock .dock-item').forEach(el => {
            el.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#' && !href.startsWith('javascript') && !this.id.includes('dockMusicToggle')) {
                    e.preventDefault();
                    const page = this.dataset.page;
                    if (page) markPageVisited(page);
                    navigateWithTransition(href);
                }
            });
        });

        document.getElementById('dockMusicToggle').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleMusic();
        });

        // ================================================================
        // 6. ENTRY OVERLAY + SHOW CONTENT (longer intro, ALWAYS plays)
        // ================================================================
        const entryOverlay = document.getElementById('entryOverlay');
        const mainContent = document.getElementById('mainContent');
        const bgVideo = document.getElementById('bgVideo');
        const musicPlayer = document.getElementById('musicPlayer');
        const bottomDock = document.getElementById('bottomDock');
        const auroraOverlay = document.getElementById('auroraOverlay');
        const ambientCanvasEl = document.getElementById('ambientParticlesCanvas');
        const typewriterEl = document.getElementById('typewriterText');

        function showContent() {
            entryOverlay.classList.add('hidden');
            bgVideo.classList.add('visible');
            auroraOverlay.classList.add('visible');
            ambientCanvasEl.classList.add('visible');
            mainContent.classList.add('visible');
            musicPlayer.classList.add('visible');
            bottomDock.classList.add('visible');
            bgVideo.play().catch(e => console.log('Video autoplay blocked:', e));
            setTimeout(initLucideIcons, 200);
            updateProgressIndicator();

            if (!window.ambientStarted) {
                window.ambientStarted = true;
                requestAnimationFrame(animateAmbientParticles);
            }
            if (!window.confettiStarted) {
                window.confettiStarted = true;
                // 🔧 CRITICAL FIX: Confetti ab 1200ms baad start hogi,
                // jisse overlay ka 1.2s fade-out poori tarah complete ho chuka hoga
                setTimeout(startConfetti, 1200);
            }
        }

        function startTypewriterNow() {
            if (window.typewriterStarted) return;
            window.typewriterStarted = true;
            typewriterEl.innerHTML = '';
            const msg = "what you wanna see first";
            let idx = 0;
            const interval = setInterval(() => {
                if (idx < msg.length) {
                    typewriterEl.innerHTML += msg.charAt(idx);
                    idx++;
                } else {
                    clearInterval(interval);
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    typewriterEl.appendChild(cursor);
                }
            }, 70);
        }

        window.addEventListener('pageshow', function(event) {
            // 🔧 CRITICAL FIX: Ab sirf tab skip karo jab page bfcache se restore ho.
            // Baaki har fresh load par (chahe index.html se aaye ya kahin se bhi) intro dikhega.
            if (event.persisted) {
                // Page bfcache se restored – turant content dikhao
                showContent();
                startTypewriterNow();
                updateProgressIndicator();
            } else {
                // Fresh load – poora intro animation dikhao
                setTimeout(() => {
                    showContent();
                }, 3000);
                setTimeout(() => {
                    startTypewriterNow();
                }, 3300);
            }
            setTimeout(initLucideIcons, 300);
            setTimeout(initLucideIcons, 800);
        });

        // ================================================================
        // 7. MEMORY PROGRESS INDICATOR
        // ================================================================
        function markPageVisited(page) {
            const visited = JSON.parse(localStorage.getItem('visitedPages2025') || '[]');
            if (!visited.includes(page)) {
                visited.push(page);
                localStorage.setItem('visitedPages2025', JSON.stringify(visited));
            }
        }

        function getVisitedPages() {
            return JSON.parse(localStorage.getItem('visitedPages2025') || '[]');
        }

        function updateProgressIndicator() {
            const visited = getVisitedPages();
            const dots = document.querySelectorAll('.progress-dot');
            const lines = document.querySelectorAll('.progress-line');
            dots.forEach(dot => {
                const page = dot.dataset.page;
                if (visited.includes(page)) {
                    dot.classList.add('visited');
                }
            });
            const dotElements = Array.from(dots);
            for (let i = 0; i < dotElements.length - 1; i++) {
                if (visited.includes(dotElements[i].dataset.page) && visited.includes(dotElements[i + 1].dataset.page)) {
                    if (lines[i]) lines[i].classList.add('done');
                }
            }
            document.querySelectorAll('.nav-card').forEach(card => {
                const page = card.dataset.page;
                if (visited.includes(page)) {
                    card.classList.add('visited-card');
                }
            });
        }

        // ================================================================
        // 8. PREMIUM MUSIC CONTROLLER (icon fix)
        // ================================================================
        let isMusicPlaying = false;
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressWrap = document.getElementById('progressWrap');

        bgVideo.muted = true;

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateMusicUI() {
            playPauseIcon.innerHTML = '';
            if (isMusicPlaying) {
                playPauseIcon.setAttribute('data-lucide', 'volume2');
            } else {
                playPauseIcon.setAttribute('data-lucide', 'volume-x');
            }
            lucide.createIcons({
                icons: {
                    volume2: lucide.icons.Volume2,
                    volumeX: lucide.icons.VolumeX
                },
                attrs: {
                    width: 16,
                    height: 16,
                    stroke: 'currentColor'
                }
            });
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                bgVideo.muted = true;
                isMusicPlaying = false;
                localStorage.setItem('musicPlaying', 'false');
            } else {
                bgVideo.muted = false;
                bgVideo.volume = 0.2;
                isMusicPlaying = true;
                localStorage.setItem('musicPlaying', 'true');
                if (bgVideo.paused) {
                    bgVideo.play().catch(e => console.log('Play error:', e));
                }
            }
            updateMusicUI();
        }

        playPauseBtn.addEventListener('click', toggleMusic);

        progressWrap.addEventListener('click', function(e) {
            if (!bgVideo.duration || isNaN(bgVideo.duration)) return;
            const rect = progressWrap.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            bgVideo.currentTime = ratio * bgVideo.duration;
        });

        bgVideo.addEventListener('timeupdate', function() {
            if (!bgVideo.duration || isNaN(bgVideo.duration)) return;
            const progress = (bgVideo.currentTime / bgVideo.duration) * 100;
            progressBar.style.width = progress + '%';
            timeDisplay.textContent = formatTime(bgVideo.currentTime);
        });
        bgVideo.addEventListener('loadedmetadata', function() {
            timeDisplay.textContent = formatTime(0);
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                const savedState = localStorage.getItem('musicPlaying');
                if (savedState === 'true' && !isMusicPlaying) {
                    bgVideo.muted = false;
                    bgVideo.volume = 0.2;
                    isMusicPlaying = true;
                    updateMusicUI();
                    bgVideo.play().catch(e => console.log('Play error:', e));
                } else if (savedState === 'false' && isMusicPlaying) {
                    bgVideo.muted = true;
                    isMusicPlaying = false;
                    updateMusicUI();
                }
            }
        });

        updateMusicUI();

        // ================================================================
        // 9. KEYBOARD NAVIGATION
        // ================================================================
        const cardNavLinks = document.querySelectorAll('.nav-card');
        let focusedCardIndex = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                if (e.key === 'ArrowLeft') {
                    focusedCardIndex = (focusedCardIndex - 1 + cardNavLinks.length) % cardNavLinks.length;
                } else {
                    focusedCardIndex = (focusedCardIndex + 1) % cardNavLinks.length;
                }
                cardNavLinks[focusedCardIndex].focus();
            } else if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.classList.contains('nav-card')) {
                    e.preventDefault();
                    const page = active.dataset.page;
                    if (page) markPageVisited(page);
                    navigateWithTransition(active.getAttribute('href'));
                }
            }
        });

        updateProgressIndicator();

        console.log('🎂✨ Welcome animation FIXED: ab hamesha dikhega, confetti sirf baad mein aayegi.');
    </script>
</body>
</html>
